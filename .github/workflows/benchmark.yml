name: Benchmark

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      agent:
        description: "Agent paradigm"
        required: true
        default: "react"
        type: choice
        options: [react, pal, pot]
      model:
        description: "LLM provider (direct mode)"
        required: true
        default: "openrouter"
        type: choice
        options: [groq, openrouter]
      samples:
        description: "Number of samples (full minidev = 500)"
        required: true
        default: "500"
        type: string
      delay:
        description: "Seconds between questions"
        required: true
        default: "2.0"
        type: string
      no-verdict:
        description: "Disable LLM verdict checker"
        required: true
        default: false
        type: boolean

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.1.0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache BIRD data
        id: cache-bird
        uses: actions/cache@v4
        with:
          path: data/bird
          key: bird-minidev-v1

      - name: Download BIRD data
        if: steps.cache-bird.outputs.cache-hit != 'true'
        run: bash scripts/download_bird.sh

      - name: Install dependencies
        run: uv sync

      - name: Run benchmark
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          ARGS=(
            --agent "${{ github.event.inputs.agent || 'react' }}"
            --mode direct
            --model "${{ github.event.inputs.model || 'openrouter' }}"
            --samples "${{ github.event.inputs.samples || '500' }}"
            --delay "${{ github.event.inputs.delay || '2.0' }}"
          )
          if [ "${{ github.event.inputs.no-verdict }}" = "true" ]; then
            ARGS+=(--no-verdict)
          fi
          uv run python -m benchmarks.run "${ARGS[@]}"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.event.inputs.agent || 'react' }}-${{ github.event.inputs.model || 'openrouter' }}-${{ github.run_number }}
          path: results/*.json
          retention-days: 90
